<div class="min-h-screen flex items-center justify-center bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-lg">
    <div>
      <h2 class="text-center text-3xl font-extrabold text-gray-900">Crie sua conta</h2>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="save()" class="mt-8 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <input formControlName="nome" placeholder="Nome" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">
        <input formControlName="sobrenome" placeholder="Sobrenome" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">
      </div>

      <input formControlName="email" type="email" placeholder="E-mail" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">
      <input formControlName="telefone" placeholder="Telefone" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">

      <div class="grid grid-cols-2 gap-4">
        <input formControlName="senha" type="password" placeholder="Senha" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">
        <input formControlName="confirmarSenha" type="password" placeholder="Confirmar" class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm">
      </div>

      <div class="flex items-center justify-between gap-4 pt-4">
        <button
  type="submit"
  [disabled]="signupForm.invalid"
  [class.opacity-50]="signupForm.invalid"
  class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold disabled:cursor-not-allowed">
  Cadastrar
</button>
        <button type="button" (click)="toggleModal()" class="w-full flex justify-center py-2 px-4 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>

<div *ngIf="showModal" class="fixed z-10 inset-0 overflow-y-auto">
  <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
    <div class="fixed inset-0 transition-opacity" aria-hidden="true">
      <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
    </div>
    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
    <div class="inline-block align-middle bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
      <div>
        <div class="mt-3 text-center sm:mt-5">
          <h3 class="text-lg leading-6 font-medium text-gray-900">Deseja cancelar?</h3>
        </div>
      </div>
      <div class="mt-5 sm:mt-6 grid grid-cols-2 gap-3">
        <button type="button" (click)="confirmCancel()" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:text-sm">
          Sim
        </button>
        <button type="button" (click)="toggleModal()" class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:text-sm">
          Não
        </button>
      </div>
    </div>
  </div>
</div>
