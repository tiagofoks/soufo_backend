<div class="min-h-screen flex items-center justify-center bg-slate-950 p-4 sm:p-8">

  <div class="w-full max-w-2xl bg-slate-900/60 backdrop-blur-xl rounded-3xl shadow-2xl p-8 sm:p-12 border border-slate-800/50 transform transition-all scale-100">

    <div class="flex items-center gap-4 mb-10 border-b border-slate-800 pb-6">
      <img src="assets/logo-soufo.png" alt="Soufo Logo" class="h-10 w-auto drop-shadow-[0_0_10px_rgba(6,182,212,0.2)]">
      <div class="flex flex-col">
        <h2 class="text-3xl font-bold text-slate-100 tracking-tight">Crie sua conta</h2>
        <p class="text-sm text-slate-400 mt-1 font-light">Inovações que transformam ideias em ação</p>
      </div>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="save()" class="space-y-6">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Nome</label>
          <input formControlName="nome" type="text" placeholder="Tiago"
                 class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Sobrenome</label>
          <input formControlName="sobrenome" type="text" placeholder="Sepulveda"
                 class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">E-mail</label>
          <input formControlName="email" type="email" placeholder="tiago@soufo.com"
                 class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Telefone</label>
          <input formControlName="telefone" type="tel" placeholder="(15) 99999-9999"
                 class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 pb-4">
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Senha</label>
          <input formControlName="senha" type="password" placeholder="••••••••"
                 class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Confirmar Senha</label>
          <input formControlName="confirmarSenha" type="password" placeholder="••••••••"
                 class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800">
        </div>
      </div>

      <div class="flex items-center justify-end gap-4 pt-6 border-t border-slate-800">
        <button type="button" (click)="toggleModal()"
                class="px-6 py-3 rounded-xl border border-slate-800 text-slate-500 hover:text-slate-200 hover:border-slate-700 hover:bg-slate-800/30 font-semibold text-sm transition-all uppercase tracking-widest">
          Cancelar
        </button>
        <button type="submit"
                class="px-10 py-3 rounded-xl bg-gradient-to-r from-violet-600 via-indigo-600 to-cyan-500 hover:brightness-110 text-white font-bold text-sm transition-all shadow-lg shadow-cyan-950/20 active:scale-[0.98]">
          Finalizar Cadastro
        </button>
      </div>
    </form>

  </div>
</div>
