<div class="container">
  <div class="card">
    <h2>Recuperar Senha</h2>
    <p>Informe seu e-mail e enviaremos uma senha temporária.</p>

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Digite seu e-mail"
      class="form-control"
    >

    <div class="actions">
      <button (click)="sendEmail()">Enviar E-mail</button>
      <button class="link" (click)="backToLogin()">Voltar para o Login</button>
    </div>
  </div>
</div>
