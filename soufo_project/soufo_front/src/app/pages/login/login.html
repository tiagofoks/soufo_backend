<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-200">

    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-900">Bem-vindo</h2>
      <p class="text-gray-500 mt-2">Acesse sua conta para continuar</p>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
        <input type="email" placeholder="seu@email.com"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
        <input type="password" placeholder="••••••••"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
      </div>

      <button (click)="goToHome()" type="button"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-200">
        Entrar
      </button>

      <div class="flex items-center justify-between mt-6 text-sm">
        <button (click)="goToForgotPassword()" type="button" class="text-blue-600 hover:underline font-medium">
          Esqueci a senha
        </button>
        <button (click)="goToSignup()" type="button" class="text-blue-600 hover:underline font-medium">
          Criar conta
        </button>
      </div>
    </form>

  </div>
</div>
