<div class="min-h-screen w-full flex items-center justify-center bg-slate-950 px-4">
  <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-800/50">

    <div class="flex flex-col items-center mb-8">
      <img src="/assets/logo-soufo.png" alt="Soufo Logo" class="w-40 h-auto mb-2 drop-shadow-[0_0_15px_rgba(6,182,212,0.3)]">
      <p class="text-slate-500 text-[10px] font-medium tracking-[0.3em] uppercase">Inovações em ação</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">E-mail</label>
        <input formControlName="email" type="email" class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-800" placeholder="tiago@soufo.com">
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Senha</label>
        <input formControlName="password" type="password" class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 outline-none transition-all" placeholder="••••••••">
      </div>

      <div *ngIf="errorMessage" class="text-red-400 text-sm font-semibold">{{ errorMessage }}</div>

      <button type="submit" class="w-full bg-gradient-to-r from-violet-600 via-indigo-600 to-cyan-500 hover:brightness-110 text-white font-bold py-4 rounded-2xl shadow-lg shadow-cyan-950/20 transition-all active:scale-[0.98] mt-2">
        Entrar no Sistema
      </button>

      <div class="flex justify-between items-center pt-4 border-t border-slate-800/50">
        <button type="button" (click)="goToForgotPassword()" class="text-[10px] text-slate-500 hover:text-cyan-400 transition-colors font-bold uppercase tracking-widest">Esqueci a senha</button>
        <button type="button" (click)="goToSignup()" class="text-[10px] text-slate-500 hover:text-cyan-400 transition-colors font-bold uppercase tracking-widest">Criar conta</button>
      </div>
    </form>
  </div>
</div>
